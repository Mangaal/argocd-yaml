apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssa-bug-test
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bug-test
  template:
    metadata:
      labels:
        app: bug-test
    spec:
      containers:
      - name: test-container
        image: alpine:latest
        # Wrap the sleep in a shell command. 
        # The shell will safely ignore our fake args.
        command: ["sh", "-c", "sleep 3600"]
        args:
        - "--authoritative-cpu-request-dry-run=true"
        - "--authoritative-cpu-limit-dry-run=true"
