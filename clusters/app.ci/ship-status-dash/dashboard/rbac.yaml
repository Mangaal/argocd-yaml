apiVersion: v1
kind: ServiceAccount
metadata:
  name: ship-status
  namespace: manifest-path-repro
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ship-status-chai-bot
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ship-status-chai-bot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ship-status-chai-bot
subjects:
  - kind: ServiceAccount
    name: chai-bot
    namespace: manifest-path-repro
